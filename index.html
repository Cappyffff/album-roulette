<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>100 Albums to Listen To</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-title" content="100 Albums">
  <meta name="theme-color" content="#0b0b0e">
  <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
  <div id="bg"></div>

  <header>
    <div id="pbar"><div></div></div>
    <div class="header-inner">
      <h1>100 Albums to listen to</h1>
      <div class="header-right">
        <span id="progress" class="progress"></span>
        <button id="lockBtn" class="lock-btn" hidden></button>
      </div>
    </div>
    <nav id="tabs">
      <button data-tab="today" class="tab active">Today</button>
      <button data-tab="past" class="tab">Past</button>
    </nav>
  </header>

  <main id="view"></main>

  <footer id="modeNote"></footer>

  <script src="albums.js?v=11"></script>
  <script src="config.js?v=11"></script>
  <script type="module" src="app.js?v=11"></script>
</body>
</html>
